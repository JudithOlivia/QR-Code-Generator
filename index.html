<!DOCTYPE html>
<html
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container"
        <h1>QR Code Generator</h1>
        <p class ="subtitle">Customize colors & add your logo or emoji</p>

        <div class="form-group">
            <label>Link or Text:</label>
            <textarea id="qrText" placeholder="https://example.com or any text..."></textarea>
            <div class="error" id="textError">Please enter a valid URL or text</div>
        </div>

        <div class="color-group">
            <div class="color-item">
                <label>QR Color</label>
                <input type="color" id="qrColor" value="#000000">
            </div>
            <div class="color-item">
                <label> Background Color</label>
                <input type="color" id="BgColor" value="#ffffff">
            </div>
        </div>

        <div class="form-group">
            <label> Size </label>
            <select id="qrSize">
                <option value="256">Small (256x256)</option>
                <option value="512" selected>Medium (512x512)</option>
                <option value="1024">Large (1024x1024)</option>
                <option value="2048">Extra Large (2048x2048)</option>
            </select>

            <label> Logo / Emoji </label>
            <div class="logo-upload" id="logoUpload">
                Click to Upload
                <input type="file" id="logoFile" accept="image/*" style="display: none;">
            </div>
            <div id="logoPreview" style="display: none; margin-top: 10px;">
                <img id="previewImg" style="max-width: 50px; max-height: 50px;">
                <button type="button" id="removeLogo" style="width: auto; padding: 5px 10px; margin-left: 10px;">Remove</button>
            </div>
            <div style="margin-top: 10px;">
                <label style="font-size: 14px;">Or use an emoji:</label>
                <input type="text" id="emojiInput" placeholder="😊 🎨 🚀 ❤️ " maxlength="2" style="width: 100%; margin-top: 5px;">
            </div>
        </div>

        <button id="generateBtn">Generate QR Code</button>

        <div id="qrContainer" style="display: none;">
            <canvas id="qrCanvas"></canvas>
            <div style="margin-top: 15px; display: flex; gap: 10px; justify-content:center;">
                <button id="downloadPNG" style="width: auto; background: #4CaF50"> Download PNG</button>
                <button id="downloadJPG" style="width: auto; background: #4CaF50"> Download JPG</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <script src="script.js"></script>

</body>
